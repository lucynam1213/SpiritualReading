<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마음에서 들려오는 사랑의 소리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="reader-wrapper">
    <div class="book-card" id="bookCard"></div>
    <div class="controls">
      <div class="nav-group">
        <button class="btn nav-btn first-btn" id="firstBtn" aria-label="처음으로" title="처음으로 (Home)">&#171;</button>
        <button class="btn nav-btn" id="prevBtn" aria-label="이전 페이지" title="이전 (←)">&#8592;</button>
        <span class="page-indicator" id="pageIndicator"></span>
        <button class="btn nav-btn" id="nextBtn" aria-label="다음 페이지" title="다음 (→)">&#8594;</button>
      </div>
      <div class="font-group">
        <button class="btn size-btn" id="decreaseFont" aria-label="글자 작게" title="글자 작게">A&#8722;</button>
        <button class="btn size-btn" id="increaseFont" aria-label="글자 크게" title="글자 크게">A+</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
